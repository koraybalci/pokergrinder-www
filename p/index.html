---
layout: profile
permalink: /p/
sitemap: false
---

<div class="card">
  <div id="content">
    <div class="state-msg">
      <div class="spinner"></div>
      Loading profile…
    </div>
  </div>

  <div class="cta">
    <p class="cta-title">Track your own live poker game</p>
    <p class="cta-sub">Bankroll, sessions and preflop stats — free on Poker Grinder.</p>
    <div class="stores">
      <a href="https://apps.apple.com/app/id6773290275?ct=share-profile" id="store-ios">
        <img src="{{ '/assets/images/App-Store.png' | relative_url }}" alt="Download on the App Store">
      </a>
      <a href="https://play.google.com/store/apps/details?id=com.pokergrinder.poker_grinder&referrer=utm_source%3Dshare%26utm_medium%3Dprofile%26utm_campaign%3Dapp_share" id="store-android">
        <img src="{{ '/assets/images/Google-Play-Button.png' | relative_url }}" alt="Get it on Google Play">
      </a>
    </div>
  </div>
</div>

<script>
  (function () {
    var SUPABASE_URL = 'https://rdlrzdsafkcnhphdbibc.supabase.co';
    var SUPABASE_KEY = 'sb_publishable_ujutq1N-IPHkx21nWl-Csg_6d3Nqh8x';

    var el = document.getElementById('content');

    // Handle comes from ?u=<handle> (the /p/<handle> 404 router redirects here).
    var params = new URLSearchParams(window.location.search);
    var handle = (params.get('u') || '').trim();

    // Restore the clean /p/<handle> URL for sharing/back-button.
    if (handle) {
      try { history.replaceState({}, '', '/p/' + encodeURIComponent(handle)); } catch (e) {}
    }

    // Surface the matching store on mobile (both shown on desktop). The store
    // links carry share attribution (Play Install Referrer / App Store ct).
    (function () {
      var ua = navigator.userAgent || '';
      var hide = /android/i.test(ua) ? 'store-ios'
        : (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) ? 'store-android' : null;
      if (hide) {
        var node = document.getElementById(hide);
        if (node) node.style.display = 'none';
      }
    })();

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, function (c) {
        return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c];
      });
    }

    function flagEmoji(cc) {
      if (!cc || cc.length !== 2) return '';
      return cc.toUpperCase().replace(/./g, function (c) {
        return String.fromCodePoint(127397 + c.charCodeAt(0));
      });
    }

    var COUNTRY_NAMES = {
      AU: 'Australia', US: 'United States', GB: 'United Kingdom', NZ: 'New Zealand',
      CA: 'Canada', IE: 'Ireland', DE: 'Germany', FR: 'France', ES: 'Spain',
      IT: 'Italy', NL: 'Netherlands', BR: 'Brazil', MX: 'Mexico', AR: 'Argentina'
    };

    function initials(name) {
      var parts = (name || '').trim().split(/\s+/).filter(Boolean);
      if (parts.length === 0) return '?';
      if (parts.length === 1) return parts[0].charAt(0).toUpperCase();
      return (parts[0].charAt(0) + parts[parts.length - 1].charAt(0)).toUpperCase();
    }

    var AVATAR_COLORS = ['#5F2167', '#7A3B82', '#48306B', '#8A4B93', '#3D2A5E', '#6B2E74'];
    function avatarColor(name) {
      var h = 0;
      for (var i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
      return AVATAR_COLORS[h % AVATAR_COLORS.length];
    }

    // Org id like "apl-au" → "APL"; "kings-au" → "KINGS". Strips trailing -<cc>.
    function orgAbbr(id) {
      return String(id).replace(/-[a-z]{2}$/i, '').toUpperCase();
    }

    // "Member since June 2026" from an ISO timestamp; '' if missing/invalid.
    function memberSince(iso) {
      if (!iso) return '';
      var d = new Date(iso);
      if (isNaN(d.getTime())) return '';
      return d.toLocaleString('en-US', { month: 'long', year: 'numeric' });
    }

    function n(val) { return (typeof val === 'number') ? val : 0; }

    function ordinal(n) {
      if (n === 1) return '1st';
      if (n === 2) return '2nd';
      if (n === 3) return '3rd';
      return n + 'th';
    }

    function iconSvg(path) {
      return '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">' + path + '</svg>';
    }

    function statChip(icon, label) {
      return '<span class="stat-chip">' + iconSvg(icon) + escapeHtml(label) + '</span>';
    }

    function showState(msg) {
      el.innerHTML = '<div class="state-msg">' + msg + '</div>';
    }

    function render(p) {
      var name = p.display_name || 'Poker player';
      var flag = flagEmoji(p.country);
      var countryName = COUNTRY_NAMES[(p.country || '').toUpperCase()] || p.country || '';
      var affs = Array.isArray(p.affiliations) ? p.affiliations : [];
      var tCount = n(p.tournament_count);
      var cCount = n(p.cash_count);
      var wins = n(p.tournament_wins);
      var itm = n(p.itm_count);
      var finalTables = n(p.final_tables);
      var bestRank = (typeof p.best_finish_rank === 'number') ? p.best_finish_rank : null;
      var bestEntries = (typeof p.best_finish_entries === 'number') ? p.best_finish_entries : null;
      var leagues = n(p.organisers_count);
      var minutes = n(p.minutes_logged);

      var html = '';
      html += '<div class="card-inner">';
      html += '  <div class="avatar" style="background:' + avatarColor(name) + '">' + escapeHtml(initials(name)) + '</div>';
      html += '  <h1 class="name">' + escapeHtml(name) + '</h1>';
      if (flag || countryName) {
        html += '  <p class="country">' + flag + (countryName ? '&nbsp;&nbsp;' + escapeHtml(countryName) : '') + '</p>';
      }
      var since = memberSince(p.created_at);
      if (since) {
        html += '  <p class="member-since">Member since ' + escapeHtml(since) + '</p>';
      }
      html += '  <div class="divider"></div>';

      // Hours logged — separate, on top.
      if (minutes > 0) {
        var hrs = Math.floor(minutes / 60);
        var hoursLabel = hrs > 0 ? (hrs + 'h logged') : (minutes + 'm logged');
        html += '  <div class="stat-chips" style="margin-bottom:16px">'
          + statChip('<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>', hoursLabel)
          + '</div>';
      }

      // Tournaments group: played count + achievements.
      var tChips = '';
      if (wins > 0)
        tChips += statChip('<path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/>', wins + (wins === 1 ? ' win' : ' wins'));
      if (tCount > 0) {
        var rate = Math.round(itm / tCount * 100);
        tChips += statChip('<polyline points="20 6 9 17 4 12"/>', 'ITM ' + itm + ' (' + rate + '%)');
      }
      if (bestRank !== null) {
        var bestLabel = ordinal(bestRank) + (bestEntries ? ' of ' + bestEntries : '');
        tChips += statChip('<line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>', 'Best ' + bestLabel);
      }
      if (finalTables > 0)
        tChips += statChip('<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>', finalTables + ' final table' + (finalTables === 1 ? '' : 's'));
      if (leagues > 0)
        tChips += statChip('<path d="M17.657 16.657L13.414 20.9a2 2 0 0 1-2.827 0l-4.244-4.243a8 8 0 1 1 11.314 0z"/><circle cx="12" cy="11" r="3"/>', leagues + ' league' + (leagues === 1 ? '' : 's'));

      html += '  <div class="stat-group">';
      html += '    <p class="group-head"><span class="glabel">Tournaments</span><span class="gcount"> · ' + tCount + ' played</span></p>';
      if (tChips) html += '    <div class="stat-chips">' + tChips + '</div>';
      html += '  </div>';

      // Cash group: played count only.
      html += '  <div class="stat-group">';
      html += '    <p class="group-head"><span class="glabel">Cash</span><span class="gcount"> · ' + cCount + ' played</span></p>';
      html += '  </div>';

      if (affs.length) {
        html += '  <div class="section-label">Affiliations</div>';
        html += '  <div class="chips">';
        affs.forEach(function (id) { html += '<span class="chip">' + escapeHtml(orgAbbr(id)) + '</span>'; });
        html += '  </div>';
      }

      if (p.hendon_mob_url) {
        html += '  <div class="section-label">Links</div>';
        html += '  <a class="hendon" href="' + escapeHtml(p.hendon_mob_url) + '" target="_blank" rel="noopener noreferrer">';
        html += '    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>';
        html += '    View on Hendon Mob</a>';
      }

      html += '</div>';
      el.innerHTML = html;

      document.title = name + ' · Poker Grinder';
    }

    if (!handle) {
      showState('No profile specified.');
      return;
    }

    // Capability-based lookup: anyone with the (unguessable) handle can view.
    // RPC returns one row by exact handle; the table itself isn't readable.
    var url = SUPABASE_URL + '/rest/v1/rpc/get_public_profile';

    fetch(url, {
      method: 'POST',
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: 'Bearer ' + SUPABASE_KEY,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ p_handle: handle })
    })
      .then(function (r) { if (!r.ok) throw new Error('http ' + r.status); return r.json(); })
      .then(function (rows) {
        if (!rows || rows.length === 0) {
          showState('This profile doesn’t exist.<br>Grab the app to start your own.');
          return;
        }
        render(rows[0]);
      })
      .catch(function () {
        showState('Couldn’t load this profile right now.<br>Please try again later.');
      });
  })();
</script>
