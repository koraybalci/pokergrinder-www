- title: Session Tracking
  description: Log game type, buy-in, rebuys, expenses, venue, blinds and result for every cash game and tournament — every session in one place.
  image: assets/images/service-icon2.png
  screenshot: assets/images/screen-sessions.png
- title: Bankroll Report
  description: Watch your bankroll climb session by session. The full report unlocks after 10 completed sessions so the curve tells a real story.
  image: assets/images/service-icon3.png
  screenshot: assets/images/screen-bankroll-chart.png
  landscape: true
- title: Hand Review
  description: Record hands with hero cards, position, stack, street-by-street action and result — then review every hand across all your sessions in Study.
  image: assets/images/service-icon5.png
  screenshot: assets/images/screen-hand-recorder.png
- title: Poker Tools
  description: Pot odds & EV, ICM and chip-chop final-table deals, and hand-vs-hand equity — the math you need, right at the table.
  image: assets/images/service-icon4.png
  screenshot: assets/images/screen-tools.png
- title: Live Preflop Stats
  description: Track your VPiP, PFR and 3-Bet live as you play, and adjust on the fly to hit the ranges you're targeting.
  image: assets/images/service-icon6.png
  screenshot: assets/images/screen-preflop.png
- title: Variance & Luck Score
  description: Log all-ins, flips, suckouts, bad beats and rivers to get a Luck Score and see how variance is really treating you.
  image: assets/images/service-icon.png
  screenshot: assets/images/screen-lucky-counter.png
